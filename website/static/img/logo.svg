<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Billpay Book">
  <defs>
    <linearGradient id="axBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#002663"/>
      <stop offset="0.55" stop-color="#016FD0"/>
      <stop offset="1" stop-color="#00A3E0"/>
    </linearGradient>
  </defs>
  <!-- Amex "Blue Box"–inspired rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="7.5" fill="url(#axBox)"/>
  <!-- Ascending payment bars -->
  <rect x="8" y="17.5" width="3.3" height="6.5" rx="1.2" fill="#ffffff" opacity="0.9"/>
  <rect x="14.35" y="12.5" width="3.3" height="11.5" rx="1.2" fill="#ffffff" opacity="0.95"/>
  <rect x="20.7" y="8" width="3.3" height="16" rx="1.2" fill="#ffffff"/>
</svg>
